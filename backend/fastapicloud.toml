[project]
name = "the-rental-shop"
version = "0.1.0"
description = "The Rental Shop Backend API"
requires-python = ">=3.11"
dependencies = []

[tool.fastapi]
# This points directly to the app object at the bottom of main.py
entrypoint = "app.main:app"
app_dir = "."
python_version = "3.11"

[env]
DATABASE_URL = "sqlitecloud://host:port/database?apikey=your-production-api-key"
GEMINI_API_KEY = "your-gemini-api-key"
CORS_ORIGINS = '["https://your-frontend-domain.com"]'
CSRF_ENABLED = "true"
JWT_ENABLED = "true"
SECRET_KEY = "generate-a-new-secret-key-in-production"
PYO3_USE_ABI3_FORWARD_COMPATIBILITY = "1"